<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applied Data Career Bootcamp | Sam</title>
  <style>
    :root {
      --green: #11833f;
      --green-dark: #0b6b32;
      --green-light: #e9f8ef;
      --navy: #06142b;
      --muted: #65748b;
      --line: #e5e9f0;
      --bg: #f3f6f9;
      --card: #ffffff;
      --soft: #f8fafc;
      --orange: #f59e0b;
      --blue: #2563eb;
      --purple: #7c3aed;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--navy);
      background: linear-gradient(180deg, #128341 0 260px, var(--bg) 260px 100%);
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .hero {
      color: white;
      text-align: center;
      padding: 68px 20px 96px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.8rem);
      letter-spacing: -0.05em;
      font-weight: 900;
    }

    .hero p {
      margin: 16px 0 0;
      font-size: 1.05rem;
      opacity: 0.95;
    }

    .page {
      width: min(1080px, calc(100% - 32px));
      margin: -56px auto 80px;
    }

    .profile-card {
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(226,232,240,0.9);
      border-radius: 18px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin: 0 auto 36px;
    }

    .profile-item {
      padding: 24px 18px;
      text-align: center;
      border-right: 1px solid var(--line);
    }
    .profile-item:last-child { border-right: 0; }
    .profile-label {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: #9aa5b5;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .profile-value { font-size: 1.02rem; font-weight: 900; }

    .tabs-wrap {
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 8px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      min-width: max-content;
      align-items: center;
    }

    .tab-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 12px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 900;
      font-size: 0.94rem;
      white-space: nowrap;
      transition: 0.18s ease;
    }
    .tab-btn:hover { background: rgba(17, 131, 63, 0.08); color: var(--green-dark); }
    .tab-btn.active { background: var(--green); color: white; box-shadow: 0 10px 22px rgba(17, 131, 63, 0.25); }

    .content-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section {
      padding: 36px;
      border-bottom: 1px solid var(--line);
    }
    .section:last-child { border-bottom: 0; }

    .eyebrow {
      color: var(--green);
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 950;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0 0 18px;
      font-size: clamp(1.7rem, 4vw, 2.45rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    h3 {
      margin: 0 0 14px;
      font-size: 1.25rem;
      letter-spacing: -0.03em;
    }

    .lead {
      background: var(--soft);
      border-radius: 16px;
      padding: 20px 22px;
      color: #334155;
      line-height: 1.7;
      margin: 18px 0 0;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .mini-card {
      border: 1px solid var(--line);
      background: white;
      border-radius: 18px;
      padding: 20px;
    }
    .mini-card p { margin: 0; color: var(--muted); line-height: 1.6; }
    .mini-card ul { margin: 10px 0 0; padding-left: 18px; color: #475569; line-height: 1.75; }

    .session-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 22px;
    }

    .session-summary {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 16px;
      padding: 18px;
    }
    .session-summary strong { display: block; margin-bottom: 8px; }
    .session-summary span { color: var(--muted); line-height: 1.55; }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0 0;
    }
    .pill {
      border-radius: 999px;
      padding: 7px 10px;
      background: #eef2f7;
      color: #475569;
      font-size: 0.78rem;
      font-weight: 850;
    }
    .pill.sql { background: #eaf8f0; color: #0b6b32; }
    .pill.python { background: #eff6ff; color: #1d4ed8; }

    .practice-block {
      margin-top: 24px;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: white;
    }

    .practice-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      background: #fbfdff;
      border-bottom: 1px solid var(--line);
    }
    .practice-header .title {
      font-weight: 950;
      letter-spacing: -0.02em;
    }
    .practice-header .count {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 800;
    }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.94rem;
    }
    th, td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #94a3b8;
      background: #fbfdff;
      font-weight: 950;
    }
    tr:last-child td { border-bottom: 0; }
    td.topic { font-weight: 900; color: #0f172a; white-space: nowrap; }
    td.focus { color: #475569; }
    td.problem a { font-weight: 850; }

    .empty-state {
      border: 1px dashed #cbd5e1;
      background: #f8fafc;
      border-radius: 18px;
      padding: 26px;
      color: #475569;
      line-height: 1.7;
      margin-top: 20px;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.86rem;
      margin: 24px 0 0;
    }

    @media (max-width: 840px) {
      .profile-card { grid-template-columns: repeat(2, 1fr); }
      .profile-item:nth-child(2) { border-right: 0; }
      .profile-item:nth-child(-n+2) { border-bottom: 1px solid var(--line); }
      .overview-grid, .session-grid { grid-template-columns: 1fr; }
      .section { padding: 26px 20px; }
      .practice-header { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 520px) {
      .profile-card { grid-template-columns: 1fr; }
      .profile-item { border-right: 0; border-bottom: 1px solid var(--line); }
      .profile-item:last-child { border-bottom: 0; }
      .hero { padding-top: 46px; }
      th, td { padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1>Applied Data Career Bootcamp</h1>
    <p>SQL + Python practice portal · 10-week compressed program</p>
  </header>

  <main class="page">
    <section class="profile-card" aria-label="Student profile">
      <div class="profile-item">
        <div class="profile-label">Student</div>
        <div class="profile-value">Sam</div>
      </div>
      <div class="profile-item">
        <div class="profile-label">Focus</div>
        <div class="profile-value">SQL + Python</div>
      </div>
      <div class="profile-item">
        <div class="profile-label">Target</div>
        <div class="profile-value">Analytics / DS Roles</div>
      </div>
      <div class="profile-item">
        <div class="profile-label">Format</div>
        <div class="profile-value">10 Sessions</div>
      </div>
    </section>

    <div class="tabs-wrap">
      <nav class="tabs" id="tabs" aria-label="Session navigation"></nav>
    </div>

    <article class="content-card" id="content"></article>

    <p class="footer-note">Practice links open in a new tab. Complete the assigned SQL and Python drills before each review session.</p>
  </main>

  <script>
    const sqlPractice = [
      { session: 2, subject: "WHERE", focus: "AND", url: "https://leetcode.com/problems/recyclable-and-low-fat-products/description/" },
      { session: 2, subject: "WHERE", focus: "OR", url: "https://leetcode.com/problems/big-countries/description/" },
      { session: 2, subject: "WHERE", focus: "Basic filtering", url: "https://leetcode.com/problems/find-customer-referee/description/" },
      { session: 2, subject: "GROUP BY", focus: "Grouped count", url: "https://leetcode.com/problems/number-of-unique-subjects-taught-by-each-teacher/description/" },

      { session: 3, subject: "JOIN", focus: "Basic join", url: "https://leetcode.com/problems/combine-two-tables/description/" },
      { session: 3, subject: "JOIN", focus: "Left join with identifiers", url: "https://leetcode.com/problems/replace-employee-id-with-the-unique-identifier/description/" },
      { session: 3, subject: "JOIN", focus: "Sales table join", url: "https://leetcode.com/problems/product-sales-analysis-i/description/" },
      { session: 3, subject: "JOIN", focus: "Anti-join pattern", url: "https://leetcode.com/problems/customer-who-visited-but-did-not-make-any-transactions/description/" },
      { session: 3, subject: "JOIN", focus: "Join + aggregation filter", url: "https://leetcode.com/problems/bank-account-summary-ii/description/" },

      { session: 4, subject: "HAVING", focus: "Group count filter", url: "https://leetcode.com/problems/classes-with-at-least-5-students/description/" },
      { session: 4, subject: "HAVING", focus: "All-products logic", url: "https://leetcode.com/problems/customers-who-bought-all-products/description/" },
      { session: 4, subject: "HAVING", focus: "Aggregate threshold", url: "https://leetcode.com/problems/bank-account-summary-ii/" },
      { session: 4, subject: "WHERE & JOIN", focus: "Join + null/filter logic", url: "https://leetcode.com/problems/employee-bonus/description/" },

      { session: 5, subject: "Subquery", focus: "NOT IN", url: "https://leetcode.com/problems/sales-person/" },
      { session: 5, subject: "Subquery", focus: "Comparison against related table", url: "https://leetcode.com/problems/employees-earning-more-than-their-managers/description/" },
      { session: 5, subject: "Subquery", focus: "Never-order logic", url: "https://leetcode.com/problems/customers-who-never-order/description/" },

      { session: 6, subject: "Date", focus: "Date-related grouping drill", url: "https://leetcode.com/problems/number-of-unique-subjects-taught-by-each-teacher/description/" },
      { session: 6, subject: "Date", focus: "Last 30 days", url: "https://leetcode.com/problems/user-activity-for-the-past-30-days-i/description/" },
      { session: 6, subject: "LAG", focus: "Compare with previous day", url: "https://leetcode.com/problems/rising-temperature/description/" },
      { session: 6, subject: "RANK", focus: "First activity date", url: "https://leetcode.com/problems/game-play-analysis-i/description/" },

      { session: 7, subject: "UNION", focus: "Effective-date logic", url: "https://leetcode.com/problems/product-price-at-a-given-date/description/" },
      { session: 7, subject: "UNION", focus: "Union-style warm-up", url: "https://leetcode.com/problems/recyclable-and-low-fat-products/description/" },
      { session: 7, subject: "UNION", focus: "Missing information", url: "https://leetcode.com/problems/employees-with-missing-information/" },

      { session: 8, subject: "CASE WHEN", focus: "GROUP BY", url: "https://leetcode.com/problems/monthly-transactions-i/description/" },
      { session: 8, subject: "CASE WHEN", focus: "GROUP BY", url: "https://leetcode.com/problems/capital-gainloss/description/" },
      { session: 8, subject: "CTE", focus: "SUM", url: "https://leetcode.com/problems/bank-account-summary-ii/description/" },
      { session: 8, subject: "CTE", focus: "PARTITION BY", url: "https://leetcode.com/problems/department-top-three-salaries/description/" },

      { session: 9, subject: "Window Function", focus: "RANK", url: "https://leetcode.com/problems/rank-scores/description/" },
      { session: 9, subject: "ROW_NUMBER / COUNT OVER", focus: "Consecutive Numbers", url: "https://leetcode.com/problems/human-traffic-of-stadium/description/" },
      { session: 9, subject: "Window Function", focus: "Running total", url: "https://leetcode.com/problems/last-person-to-fit-in-the-bus/description/" },
      { session: 9, subject: "UNION & SUBQUERY", focus: "AVG", url: "https://leetcode.com/problems/movie-rating/description/" }
    ];

    const pythonPractice = [
      { session: 2, subject: "Pandas setup", focus: "Create DataFrame", url: "https://leetcode.com/problems/create-a-dataframe-from-list/description/" },
      { session: 2, subject: "Pandas setup", focus: "shape", url: "https://leetcode.com/problems/get-the-size-of-a-dataframe/description/" },
      { session: 2, subject: "Pandas setup", focus: "head()", url: "https://leetcode.com/problems/display-the-first-three-rows/description/" },

      { session: 3, subject: "List", focus: "Array construction", url: "https://leetcode.com/problems/concatenation-of-array/description/" },
      { session: 3, subject: "Condition", focus: "If/else logic", url: "https://leetcode.com/problems/fizz-buzz/" },
      { session: 3, subject: "String", focus: "String replacement", url: "https://leetcode.com/problems/defanging-an-ip-address/description/" },
      { session: 3, subject: "Dict / Counter", focus: "Frequency comparison", url: "https://leetcode.com/problems/valid-anagram/description/" },

      { session: 4, subject: "Set", focus: "Unique intersection", url: "https://leetcode.com/problems/intersection-of-two-arrays/description/" },
      { session: 4, subject: "Dict / count", focus: "Majority value", url: "https://leetcode.com/problems/majority-element/description/" },
      { session: 4, subject: "Duplicates", focus: "Drop duplicate rows", url: "https://leetcode.com/problems/drop-duplicate-rows/description/" },
      { session: 4, subject: "Missing values", focus: "Drop missing rows", url: "https://leetcode.com/problems/drop-missing-data/description/" },
      { session: 4, subject: "Missing values", focus: "Fill missing values", url: "https://leetcode.com/problems/fill-missing-data/description/" },

      { session: 5, subject: "Column operation", focus: "Modify columns", url: "https://leetcode.com/problems/modify-columns/description/" },
      { session: 5, subject: "Column operation", focus: "Rename columns", url: "https://leetcode.com/problems/rename-columns/description/" },
      { session: 5, subject: "Data type", focus: "Change dtype", url: "https://leetcode.com/problems/change-data-type/description/" },
      { session: 5, subject: "Filter", focus: "Boolean filtering", url: "https://leetcode.com/problems/big-countries/description/" },
      { session: 5, subject: "Filter", focus: "Multiple conditions", url: "https://leetcode.com/problems/recyclable-and-low-fat-products/description/" },

      { session: 6, subject: "Groupby / Having", focus: "Group count filter", url: "https://leetcode.com/problems/classes-with-at-least-5-students/description/" },
      { session: 6, subject: "Merge", focus: "Basic left join", url: "https://leetcode.com/problems/combine-two-tables/description/" },
      { session: 6, subject: "Merge", focus: "Join + filter", url: "https://leetcode.com/problems/employee-bonus/description/" },
      { session: 6, subject: "Merge / exclusion", focus: "Join + NOT IN logic", url: "https://leetcode.com/problems/sales-person/" },
      { session: 6, subject: "Merge", focus: "Product sales join", url: "https://leetcode.com/problems/product-sales-analysis-i/description/" },

      { session: 7, subject: "Concatenate", focus: "Stack DataFrames", url: "https://leetcode.com/problems/reshape-data-concatenate/description/" },
      { session: 7, subject: "Pivot", focus: "Long to wide", url: "https://leetcode.com/problems/reshape-data-pivot/description/" },
      { session: 7, subject: "Melt", focus: "Wide to long", url: "https://leetcode.com/problems/reshape-data-melt/description/" },

      { session: 8, subject: "Groupby / date filter", focus: "Product count by period", url: "https://leetcode.com/problems/list-the-products-ordered-in-a-period/description/" },
      { session: 8, subject: "Date filter", focus: "Last 30 days", url: "https://leetcode.com/problems/user-activity-for-the-past-30-days-i/description/" },
      { session: 8, subject: "Date", focus: "First login", url: "https://leetcode.com/problems/game-play-analysis-i/description/" },
      { session: 8, subject: "Date", focus: "Latest login", url: "https://leetcode.com/problems/the-latest-login-in-2020/description/" },

      { session: 9, subject: "Lag-like logic", focus: "Compare with previous day", url: "https://leetcode.com/problems/rising-temperature/description/" },
      { session: 9, subject: "Groupby", focus: "Set coverage", url: "https://leetcode.com/problems/customers-who-bought-all-products/description/" },
      { session: 9, subject: "Aggregation", focus: "Single max/min logic", url: "https://leetcode.com/problems/biggest-single-number/description/" },
      { session: 9, subject: "Rolling window", focus: "Moving average", url: "https://leetcode.com/problems/restaurant-growth/description/" }
    ];

    const sessions = [
      { id: "overview", label: "Overview" },
      ...Array.from({ length: 10 }, (_, i) => ({ id: `session-${i + 1}`, label: `Session ${i + 1}` }))
    ];

    const sessionSummaries = {
      1: { sql: "Orientation, account setup, and SQL practice workflow.", python: "Python/Jupyter/Pandas setup and level-set check." },
      2: { sql: "WHERE, AND/OR, and basic GROUP BY.", python: "Pandas setup: DataFrame, shape, and head()." },
      3: { sql: "JOIN fundamentals and anti-join patterns.", python: "Core Python: list, condition, string, and dictionary/counter logic." },
      4: { sql: "HAVING, aggregate filters, and WHERE + JOIN logic.", python: "Sets, counts, duplicates, and missing-value handling." },
      5: { sql: "Subqueries, NOT IN, and related-table comparison.", python: "Column operations, data types, and boolean filtering." },
      6: { sql: "Dates, LAG-style comparison, and activity logic.", python: "Groupby, merge, joins, and exclusion logic." },
      7: { sql: "UNION patterns and missing-information logic.", python: "Reshaping data with concat, pivot, and melt." },
      8: { sql: "CASE WHEN, CTE, SUM, and partition-style thinking.", python: "Date filtering, product-period logic, and login-date problems." },
      9: { sql: "Window functions: RANK, COUNT OVER, running total, and mixed query review.", python: "Lag-like logic, set coverage, max/min aggregation, and moving average." },
      10: { sql: "Final SQL review and readiness check.", python: "Final Python/Pandas review and next-step practice plan." }
    };

    function titleFromUrl(url) {
      const parts = url.replace(/\/$/, "").split("/");
      const slug = parts.includes("description") ? parts[parts.length - 2] : parts[parts.length - 1];
      return slug
        .split("-")
        .filter(Boolean)
        .map(w => w === "ii" ? "II" : w.charAt(0).toUpperCase() + w.slice(1))
        .join(" ")
        .replace("Gainloss", "Gain/Loss");
    }

    function renderTabs(activeId) {
      const tabsEl = document.getElementById("tabs");
      tabsEl.innerHTML = sessions.map(item => `
        <button class="tab-btn ${item.id === activeId ? "active" : ""}" data-id="${item.id}">${item.label}</button>
      `).join("");

      tabsEl.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => render(btn.dataset.id));
      });
    }

    function renderOverview() {
      const summaryCards = Array.from({ length: 10 }, (_, i) => {
        const n = i + 1;
        const s = sessionSummaries[n];
        return `
          <div class="session-summary">
            <strong>Session ${n}</strong>
            <span><b>SQL:</b> ${s.sql}<br><b>Python:</b> ${s.python}</span>
          </div>
        `;
      }).join("");

      return `
        <section class="section">
          <div class="eyebrow">Student Practice Portal</div>
          <h2>SQL + Python Practice Roadmap</h2>
          <p class="lead">
            This page is a lightweight practice hub for the technical portion of the Applied Data Career Bootcamp. It only includes SQL and Python/Pandas drills for the student to complete independently between sessions.
          </p>
          <div class="overview-grid">
            <div class="mini-card">
              <h3>SQL Practice</h3>
              <p>Focuses on query fluency: filtering, grouping, joins, subqueries, dates, CTEs, and window functions.</p>
              <div class="pill-row">
                <span class="pill sql">WHERE</span><span class="pill sql">JOIN</span><span class="pill sql">GROUP BY</span><span class="pill sql">CTE</span><span class="pill sql">Window Functions</span>
              </div>
            </div>
            <div class="mini-card">
              <h3>Python / Pandas Practice</h3>
              <p>Focuses on practical data manipulation: core Python, DataFrames, cleaning, filtering, merging, reshaping, and date logic.</p>
              <div class="pill-row">
                <span class="pill python">Core Python</span><span class="pill python">Pandas</span><span class="pill python">Merge</span><span class="pill python">Pivot/Melt</span><span class="pill python">Dates</span>
              </div>
            </div>
          </div>
        </section>
        <section class="section">
          <div class="eyebrow">10-Session Map</div>
          <h2>What to Practice Each Session</h2>
          <div class="session-grid">${summaryCards}</div>
        </section>
      `;
    }

    function renderPracticeTable(type, rows) {
      const title = type === "sql" ? "SQL Practice" : "Python / Pandas Practice";
      const css = type === "sql" ? "sql" : "python";
      if (!rows.length) {
        return `
          <div class="practice-block">
            <div class="practice-header">
              <div class="title">${title}</div>
              <div class="count">No external drill links</div>
            </div>
            <div class="empty-state">
              No LeetCode drills are assigned for this session. Use this session for setup, review, live mock practice, or an individualized follow-up plan.
            </div>
          </div>
        `;
      }
      return `
        <div class="practice-block">
          <div class="practice-header">
            <div class="title">${title}</div>
            <div class="count">${rows.length} drill${rows.length > 1 ? "s" : ""}</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Subject</th>
                  <th>Focus</th>
                  <th>Problem</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(row => `
                  <tr>
                    <td class="topic"><span class="pill ${css}">${row.subject}</span></td>
                    <td class="focus">${row.focus || "Core practice"}</td>
                    <td class="problem"><a href="${row.url}" target="_blank" rel="noopener noreferrer">${titleFromUrl(row.url)}</a></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderSession(n) {
      const s = sessionSummaries[n];
      const sqlRows = sqlPractice.filter(item => item.session === n);
      const pyRows = pythonPractice.filter(item => item.session === n);

      let intro = "";
      if (n === 1) {
        intro = "This session is for orientation, setup, and baseline readiness. No external drill links are assigned yet.";
      } else if (n === 10) {
        intro = "This session is for final review, live mock-style practice, feedback, and an individualized next-step plan. No new drill links are assigned.";
      } else {
        intro = "Complete the SQL and Python/Pandas drills assigned below. The goal is not memorization, but repeated exposure to common data interview patterns.";
      }

      return `
        <section class="section">
          <div class="eyebrow">Session ${n}</div>
          <h2>Session ${n}</h2>
          <p class="lead">${intro}</p>
          <div class="overview-grid">
            <div class="mini-card"><h3>SQL</h3><p>${s.sql}</p></div>
            <div class="mini-card"><h3>Python / Pandas</h3><p>${s.python}</p></div>
          </div>
          ${renderPracticeTable("sql", sqlRows)}
          ${renderPracticeTable("python", pyRows)}
        </section>
      `;
    }

    function render(activeId = "overview") {
      renderTabs(activeId);
      const content = document.getElementById("content");
      if (activeId === "overview") {
        content.innerHTML = renderOverview();
      } else {
        const n = Number(activeId.replace("session-", ""));
        content.innerHTML = renderSession(n);
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    render("overview");
  </script>
</body>
</html>
